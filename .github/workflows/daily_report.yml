name: SDR Daily Report

on:
  schedule:
    # 7:00 AM PST (Nov-Mar) = 15:00 UTC
    # 7:00 AM PDT (Mar-Nov) = 14:00 UTC
    # Currently set for PDT (summer). Update to "0 15 * * *" in winter,
    # or switch to two schedule entries with month-aware cron if you'd
    # rather not touch this twice a year.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional PST report date to run, in YYYY-MM-DD format. Defaults to yesterday."
        required: false
        type: string

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies for WeasyPrint
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev shared-mime-info

      - name: Install Python dependencies
        run: |
          pip install requests jinja2 google-auth google-api-python-client weasyprint pymupdf numpy python-dateutil

      - name: Run daily PDF report (test phase - sends to Jason only)
        env:
          AIRCALL_API_ID: ${{ secrets.AIRCALL_API_ID }}
          AIRCALL_API_TOKEN: ${{ secrets.AIRCALL_API_TOKEN }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.report_date }}" ]; then
            python send_pdf_report.py --date "${{ github.event.inputs.report_date }}"
          else
            python send_pdf_report.py
          fi
